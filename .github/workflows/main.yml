name: 🚀 Build and Deploy Website

on:
  push:
    branches:
      - main  # আপনার মেইন ব্রাঞ্চের নাম master হলে সেটি দিন

jobs:
  build-and-deploy:
    name: 🏗️ Build & 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      # ১. কোড চেকআউট করা
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # ২. Node.js সেটআপ
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ৩. ডিপেন্ডেন্সি ইনস্টল (npm install)
      - name: 📦 Install dependencies
        run: npm install

      # ৪. প্রোজেক্ট বিল্ড করা (npm run build)
      - name: 🏗️ Build project
        run: npm run build

      # ৫. ফাইল সিঙ্ক্রোনাইজেশন (সবচেয়ে গুরুত্বপূর্ণ ধাপ)
      - name: 📂 Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # আপনার বিল্ড ফোল্ডার যদি 'dist' হয় তবে এটিই থাকবে
          local-dir: ./dist/ 
          # FTP ইউজার যদি সরাসরি public_html এ ঢুকে তবে এটি ./ থাকবে
          server-dir: ./ 
          protocol: ftp
          port: 21
          # টাইমআউট এবং রিট্রাই সেটিংস (যাতে মাঝপথে না কাটে)
          timeout: 90000
          dangerous-clean-slate: false
          # অতিরিক্ত লগ দেখার জন্য (যাতে সমস্যা ধরা যায়)
          log-level: verbose
