name: Build and Deploy to CPANEL

on:
  push:
    branches:
      - main  # আপনার ব্রাঞ্চের নাম সঠিক আছে

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: List build files (Check if build exists)
        run: ls -R dist || ls -R build

      - name: Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # আপনার প্রজেক্ট বিল্ড হয়ে যে ফোল্ডারে যায় সেটি এখানে দিন
          local-dir: ./dist/ 
          server-dir: /public_html/
          # নিচের লাইনটি আপনার সমস্যা সমাধান করবে (পুরানো রেকর্ড মুছে নতুন করে পাঠাবে)
          dangerous-clean-slate: false
