name: 🚀 Build and Deploy Website

on:
  push:
    branches:
      - main  # আপনার ব্রাঞ্চের নাম master হলে এখানে master লিখে দিন

jobs:
  build-and-deploy:
    name: 🏗️ Build & 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      # ১. GitHub থেকে লেটেস্ট কোড সংগ্রহ করা
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # ২. Node.js সেটআপ করা
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ৩. প্রোজেক্টের ডিপেন্ডেন্সি ইনস্টল করা
      - name: 📦 Install dependencies
        run: npm install

      # ৪. প্রোজেক্ট বিল্ড করা
      - name: 🏗️ Build project
        run: npm run build

      # ৫. বিল্ড করা ফাইলগুলো FTP-তে সিঙ্ক করা
      - name: 📂 Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # বিল্ড ফোল্ডার সাধারণত 'dist' বা 'build' হয়। আপনার অনুযায়ী এটি চেক করুন।
          local-dir: ./dist/ 
          # যেহেতু আপনি FTP ডিরেক্টরি public_html সেট করেছেন, তাই এখানে ./ দিন
          server-dir: ./ 
          protocol: ftp
          port: 21
          # টাইমআউট সমস্যা এড়াতে অতিরিক্ত সেটিংস
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
